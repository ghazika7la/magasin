<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
    </style>
</head>
<body>
    <h1>Test de Connexion API</h1>
    <div id="results"></div>
    
    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Tests en cours...</h2>';
            
            const tests = [
                { name: 'Health Check', url: 'http://localhost:5000/api/health' },
                { name: 'Analytics', url: 'http://localhost:5000/api/analytics' },
                { name: 'Search Console', url: 'http://localhost:5000/api/searchconsole' },
                { name: 'Recommendations', url: 'http://localhost:5000/api/recommendations' }
            ];
            
            for (const test of tests) {
                try {
                    const response = await fetch(test.url);
                    const data = await response.json();
                    
                    results.innerHTML += `
                        <div class="test success">
                            <h3>✅ ${test.name}</h3>
                            <p>Status: ${response.status}</p>
                            <p>Data: ${JSON.stringify(data).substring(0, 100)}...</p>
                        </div>
                    `;
                } catch (error) {
                    results.innerHTML += `
                        <div class="test error">
                            <h3>❌ ${test.name}</h3>
                            <p>Erreur: ${error.message}</p>
                        </div>
                    `;
                }
            }
        }
        
        testAPI();
    </script>
</body>
</html>
