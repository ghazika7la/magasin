<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Test Minimal</title>
</head>
<body>
    <h1>Dashboard SEO/IA - Test Minimal</h1>
    
    <div>
        <h2>📊 KPI Tests</h2>
        <div style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
            <h3>Visiteurs</h3>
            <p style="font-size: 2rem; font-weight: bold;">847</p>
            <p style="color: green;">↑ 5.2%</p>
        </div>
        
        <div style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
            <h3>Pages Vues</h3>
            <p style="font-size: 2rem; font-weight: bold;">3,456</p>
            <p style="color: green;">↑ 3.8%</p>
        </div>
    </div>
    
    <div>
        <h2>🔧 Actions</h2>
        <button onclick="alert('Bouton fonctionne!')" style="padding: 10px; background: #667eea; color: white; border: none; cursor: pointer;">
            Tester JavaScript
        </button>
        
        <button onclick="updateNumbers()" style="padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; margin-left: 10px;">
            Actualiser Données
        </button>
    </div>
    
    <div>
        <h2>💡 Recommandations</h2>
        <div style="border-left: 4px solid #667eea; padding: 10px; margin: 10px; background: #f8f9fa;">
            <h4>Taux de rebond élevé</h4>
            <p>Le taux de rebond moyen est de 65.5%. Améliorez la pertinence du contenu.</p>
        </div>
    </div>
    
    <script>
        console.log('🚀 Dashboard minimal chargé');
        
        function updateNumbers() {
            console.log('🔄 Mise à jour des nombres');
            const numbers = document.querySelectorAll('p[style*="font-size: 2rem"]');
            numbers.forEach(num => {
                const current = parseInt(num.textContent.replace(/[^0-9]/g, ''));
                const change = Math.floor(Math.random() * 100) - 50;
                num.textContent = (current + change).toLocaleString();
            });
            alert('Données mises à jour!');
        }
        
        // Test de chargement
        window.addEventListener('load', function() {
            console.log('✅ Page entièrement chargée');
            document.body.style.backgroundColor = '#f0f8ff';
        });
    </script>
</body>
</html>
