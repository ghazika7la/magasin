<div class="auth-wrap">
  <div class="bg-grid"></div>
  <div class="glow-orb glow-1"></div>
  <div class="glow-orb glow-2"></div>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">📊</div>
      <span class="brand-name">SEO Pulse Board</span>
    </div>

    <div class="auth-tag">#SEO-IA</div>
    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez le tableau de bord analytique SEO</p>

    <div class="alert-error" *ngIf="error()">
      <span>⚠ {{ error() }}</span>
    </div>

    <div class="form-group">
      <label>Nom complet</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" placeholder="Jean Dupont" [(ngModel)]="name" (keyup.enter)="submit()" autocomplete="name" />
      </div>
    </div>

    <div class="form-group">
      <label>Adresse e-mail</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" placeholder="vous@exemple.com" [(ngModel)]="email" (keyup.enter)="submit()" autocomplete="email" />
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          [type]="showPass() ? 'text' : 'password'"
          placeholder="Min. 6 caractères"
          [(ngModel)]="password"
          autocomplete="new-password"
        />
        <button class="toggle-pass" type="button" (click)="showPass.set(!showPass())">
          {{ showPass() ? '🙈' : '👁' }}
        </button>
      </div>
      <!-- Password strength bar -->
      <div class="strength-bar" *ngIf="password.length > 0">
        <div class="strength-track">
          <div
            class="strength-fill"
            [style.width.%]="passwordStrength.level * 25"
            [style.background]="passwordStrength.color"
          ></div>
        </div>
        <span class="strength-label" [style.color]="passwordStrength.color">
          {{ passwordStrength.label }}
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <div class="input-wrap">
        <span class="input-icon">🔐</span>
        <input
          [type]="showPass() ? 'text' : 'password'"
          placeholder="Répétez le mot de passe"
          [(ngModel)]="confirmPassword"
          (keyup.enter)="submit()"
          autocomplete="new-password"
        />
        <span class="match-icon" *ngIf="confirmPassword.length > 0">
          {{ confirmPassword === password ? '✅' : '❌' }}
        </span>
      </div>
    </div>

    <button class="btn-submit" (click)="submit()" [disabled]="loading()">
      <span *ngIf="!loading()">Créer mon compte →</span>
      <span *ngIf="loading()" class="spinner-inline"></span>
    </button>

    <p class="auth-switch">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>
