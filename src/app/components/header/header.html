<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="logo">
        <img src="assets/logo-icon.svg" alt="Magasin de Jeux Logo" class="logo-img">
        <h1>Magasin de Jeux</h1>
      </div>
      <nav class="nav">
        <ul>
          <li><a routerLink="/" class="nav-link">Accueil</a></li>
          <li><a routerLink="/jeux" class="nav-link">Jeux</a></li>
        </ul>
      </nav>
      <div class="cart-icon">
        <button class="cart-btn" (click)="toggleCart()">
          🛒 Panier ({{ totalItems }})
        </button>
      </div>
    </div>
  </div>
</header>
