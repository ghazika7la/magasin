name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Angular for GitHub Pages
        run: |
          node -e "const fs=require('fs'); const p='angular.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); const o=j.projects['magasin-jeux'].architect.build.options; o.baseHref='/seo-ia123/'; o.deployUrl='/seo-ia123/'; fs.writeFileSync(p, JSON.stringify(j, null, 2));"

      - name: Build Angular app
        run: npm run build

      - name: Prepare GitHub Pages files
        run: |
          cp docs/browser/index.html docs/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/browser
          force_orphan: true
